<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrasi – LogisTik Express Salsa</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; background: linear-gradient(135deg, #0F0F1A 0%, #1A1A2E 100%); display: flex; align-items: center; justify-content: center; padding: 30px; }
  .card { background: white; border-radius: 24px; width: 100%; max-width: 520px; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.4); }
  .card-top { background: linear-gradient(135deg, #E84B13, #C03D0E); padding: 30px 36px; }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .brand-icon { width: 38px; height: 38px; background: rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; }
  .brand-name { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 800; color: white; }
  .card-top h2 { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 800; color: white; }
  .card-top p { color: rgba(255,255,255,0.75); font-size: 13.5px; margin-top: 5px; }
  .card-body { padding: 32px 36px; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 7px; }
  .input-wrap { position: relative; }
  .input-wrap i { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: #9CA3AF; font-size: 14px; }
  input, textarea {
    width: 100%; padding: 11px 13px 11px 40px;
    border: 1.5px solid #E5E7EB; border-radius: 11px;
    font-size: 13.5px; font-family: 'Plus Jakarta Sans', sans-serif;
    color: #1A1A2E; transition: all .2s;
  }
  textarea { padding-left: 13px; resize: vertical; min-height: 80px; }
  input:focus, textarea:focus { outline: none; border-color: #E84B13; box-shadow: 0 0 0 3px rgba(232,75,19,0.1); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .btn-reg { width: 100%; padding: 13px; background: #E84B13; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; font-family: 'Plus Jakarta Sans', sans-serif; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; }
  .btn-reg:hover { background: #C03D0E; box-shadow: 0 8px 25px rgba(232,75,19,0.35); }
  .link-login { text-align: center; margin-top: 18px; color: #6B7280; font-size: 13.5px; }
  .link-login a { color: #E84B13; font-weight: 700; text-decoration: none; }
  .alert { padding: 11px 14px; border-radius: 10px; margin-bottom: 16px; font-size: 13px; display: flex; align-items: center; gap: 9px; }
  .alert-danger { background: rgba(239,68,68,0.1); color: #991B1B; border: 1px solid rgba(239,68,68,0.25); }
  .alert-success { background: rgba(16,185,129,0.1); color: #065F46; border: 1px solid rgba(16,185,129,0.25); }
</style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <div class="brand">
      <div class="brand-icon"><i class="fas fa-truck-fast"></i></div>
      <div class="brand-name">LogisTik Express</div>
    </div>
    <h2>Daftar Akun Baru</h2>
    <p>Bergabung sebagai pelanggan LogisTik Express</p>
  </div>
  <div class="card-body">
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="alert alert-{{ cat if cat in ['danger','success'] else 'info' }}">
          <i class="fas fa-info-circle"></i> {{ msg }}
        </div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label>Nama Lengkap</label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" name="nama" placeholder="Nama Lengkap" required>
        </div>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" placeholder="email@gmail.com" required>
          </div>
        </div>
        <div class="form-group">
          <label>No. HP</label>
          <div class="input-wrap">
            <i class="fas fa-phone"></i>
            <input type="tel" name="no_hp" placeholder="08xxxxxxxxxx">
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" name="password" placeholder="Min. 8 karakter" required>
        </div>
      </div>
      <div class="form-group">
        <label>Alamat</label>
        <textarea name="alamat" placeholder="Alamat lengkap Anda..."></textarea>
      </div>
      <button class="btn-reg" type="submit">
        <i class="fas fa-user-plus"></i> Daftar Sekarang
      </button>
    </form>
    <div class="link-login">Sudah punya akun? <a href="/login">Masuk di sini</a></div>
  </div>
</div>
</body>
</html>
